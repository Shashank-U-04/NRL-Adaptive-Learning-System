name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          # Install everything except torch on CI to keep wheel small/fast.
          # Torch-dependent tests skip cleanly via pytest.importorskip.
          grep -v "^torch" requirements.txt > /tmp/req-ci.txt
          pip install -r /tmp/req-ci.txt

      - name: Run pytest
        working-directory: backend
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          # Conftest also sets this, but kept here for clarity.
          SUPABASE_JWT_SECRET: "test-supabase-jwt-secret-sentinel"
          ENVIRONMENT: "test"
          DEBUG: "true"
        run: pytest -v --tb=short

  frontend-build:
    name: Frontend typecheck + lint + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Placeholder NEXT_PUBLIC_* envs let `next build` complete without
    # crashing on missing public env vars. NOT secrets — real deploys
    # supply real values via the host platform.
    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Lint
        working-directory: frontend
        # No more continue-on-error — lint failures must block.
        run: npm run lint -- --max-warnings=0

      - name: Build
        working-directory: frontend
        run: npm run build

  secret-scan:
    name: Secret scan (gitleaks, current tree only — TEMPORARY)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    # NOTE: full-history scanning was restored after git history was
    # scrubbed via git-filter-repo to remove the legacy
    # backend/test_jwt2.py leak. If you ever roll back history, swap
    # this to --no-git again and rotate any leaked secret.
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks scans past commits too. Safe now
          # that the leaked file is purged from history.
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.21.2"
          curl -sSfL -o gitleaks.tgz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tgz gitleaks
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      - name: Scan repository (full history)
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --verbose \
            --exit-code 1

  vuln-scan:
    name: Vulnerability scan (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true
