# Alembic configuration for the NRL Adaptive Learning backend.
#
# Run from the backend/ directory, with DATABASE_URL set in your env (or
# in the project root .env). Examples:
#
#   alembic upgrade head            # apply all pending migrations
#   alembic current                 # show the current applied revision
#   alembic stamp head              # mark DB as up-to-date WITHOUT running
#                                   # (use this on a pre-existing prod DB
#                                   #  whose schema was created via
#                                   #  create_all and already has every
#                                   #  table that the latest revision
#                                   #  expects, EXCEPT the new column —
#                                   #  see migrations/README for full
#                                   #  instructions).

[alembic]
script_location = migrations
prepend_sys_path = .
# We read DATABASE_URL from env in env.py, so no sqlalchemy.url here.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
