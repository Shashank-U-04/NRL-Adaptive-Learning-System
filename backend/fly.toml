# Fly.io configuration for the NRL backend.
#
# Required secrets (set with `flyctl secrets set ...` — never commit):
#   DATABASE_URL          postgresql+asyncpg://... (Neon connection)
#   SUPABASE_JWT_SECRET   Supabase project JWT signing secret (HS256)
#
# Optional secrets:
#   SUPABASE_URL          https://<project>.supabase.co (if used by code)
#   CORS_ORIGINS          comma-separated allow-list, e.g.
#                         https://nrl-adaptive.vercel.app
#
# Deploy order:
#   cd backend && flyctl launch --no-deploy            # one-time
#   flyctl secrets set DATABASE_URL=... SUPABASE_JWT_SECRET=...
#   # Apply any pending migrations BEFORE deploying new code:
#   alembic upgrade head                                # from backend/
#   # ...or run the plain-SQL fallback (see backend/migrations/sql/).
#   flyctl deploy
#
# AUTO_CREATE_TABLES is intentionally "false" below so production never
# silently mutates the schema on boot. Run migrations explicitly.

app = "nrl-adaptive-api"
primary_region = "sin"          # Singapore — closest to Neon ap-southeast-1
kill_signal    = "SIGINT"
kill_timeout   = 5

[build]
  builder    = "paketobuildpacks/builder:base"
  buildpacks = ["gcr.io/paketo-buildpacks/python"]

[env]
  PORT        = "8000"
  ENVIRONMENT = "production"
  DEBUG       = "false"
  LOG_LEVEL   = "INFO"
  # CORS_ORIGINS can be overridden per environment via flyctl secrets set.
  CORS_ORIGINS = "https://nrl-adaptive.vercel.app"
  # In production we require explicit migrations or this opt-in flag to
  # trigger SQLAlchemy create_all() at startup. Default off.
  AUTO_CREATE_TABLES = "false"

[processes]
  app = "uvicorn app.main:app --host 0.0.0.0 --port 8000"

[http_service]
  internal_port = 8000
  force_https   = true
  auto_stop_machines  = true       # save free-tier hours
  auto_start_machines = true
  min_machines_running = 0
  processes     = ["app"]

  [[http_service.checks]]
    interval     = "30s"
    timeout      = "5s"
    grace_period = "30s"
    method       = "GET"
    path         = "/health"

[[vm]]
  size      = "shared-cpu-1x"
  memory    = "512mb"
  cpu_kind  = "shared"
  cpus      = 1
