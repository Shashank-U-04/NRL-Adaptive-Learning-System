# Fly.io configuration for the NRL backend.
# Deploy with:
#   cd backend && flyctl launch --no-deploy   # one-time setup
#   flyctl secrets set DATABASE_URL=... SECRET_KEY=...
#   flyctl deploy
#
# This config uses Heroku buildpacks — NO Docker Desktop required locally.
# Fly.io builds the image remotely.

app = "nrl-adaptive-api"
primary_region = "sin"          # Singapore — closest to Neon ap-southeast-1
kill_signal    = "SIGINT"
kill_timeout   = 5

[build]
  builder    = "paketobuildpacks/builder:base"
  buildpacks = ["gcr.io/paketo-buildpacks/python"]

[env]
  PORT          = "8000"
  ENVIRONMENT   = "production"
  DEBUG         = "false"
  LOG_JSON      = "true"
  AI_PROVIDER   = "ollama"        # override per environment
  METRICS_ENABLED      = "true"
  RATE_LIMIT_ENABLED   = "true"
  RATE_LIMIT_DEFAULT   = "120/minute"
  RATE_LIMIT_AUTH      = "10/minute"

[processes]
  app = "uvicorn app.main:app --host 0.0.0.0 --port 8000"

[http_service]
  internal_port = 8000
  force_https   = true
  auto_stop_machines  = true       # save free-tier hours
  auto_start_machines = true
  min_machines_running = 0
  processes     = ["app"]

  [[http_service.checks]]
    interval     = "30s"
    timeout      = "5s"
    grace_period = "30s"
    method       = "GET"
    path         = "/health"

[[vm]]
  size      = "shared-cpu-1x"
  memory    = "512mb"
  cpu_kind  = "shared"
  cpus      = 1
